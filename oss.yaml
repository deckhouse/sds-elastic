- name: Rook
  link: https://github.com/rook/rook
  description: Cloud-native storage orchestrator that automates deployment, configuration, scaling, and management of Ceph clusters on Kubernetes.
  logo: https://avatars.githubusercontent.com/u/29152830?s=200&v=4
  license: Apache License Version 2.0
  id: rook
  version: 1.19.5

- name: Ceph
  link: https://github.com/ceph/ceph
  description: Ceph distributed storage system; provides the OSD, MON, MGR, MDS, and RGW daemons consumed by Rook-managed clusters. Each version is built from the upstream container/Containerfile at the matching tag.
  logo: https://avatars.githubusercontent.com/u/1015767?s=200&v=4
  license: GNU Lesser General Public License v2.1
  id: ceph
  versions:
    - condition:
        ceph: ["v19.2.3"]
      version: v19.2.3
    - condition:
        ceph: ["v20.2.1"]
      version: v20.2.1
