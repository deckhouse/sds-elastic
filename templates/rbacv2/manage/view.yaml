apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: sds-elastic
    rbac.deckhouse.io/aggregate-to-storage-as: viewer
    rbac.deckhouse.io/kind: manage
    rbac.deckhouse.io/level: module
    rbac.deckhouse.io/namespace: d8-sds-elastic
  name: d8:manage:permission:module:sds-elastic:view
rules:
  - apiGroups:
      - storage.deckhouse.io
    resources:
      - sdselasticclusters
    verbs:
      - get
      - list
      - watch
