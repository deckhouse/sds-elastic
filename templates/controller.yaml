{{- /* Controller Deployment + VPA + PDB */ -}}
{{- /*
  helm_lib_module_controller_manifests already injects LOG_LEVEL (from
  .Values.sdsElastic.logLevel via helm_lib_module_controller_log_level) and
  CONTROLLER_NAMESPACE (valueFrom fieldRef metadata.namespace). Adding them
  again here triggers the env-variables-duplicates lint rule.
*/ -}}
{{- $config := dict
  "valuesKey" "sdsElastic"
  "onMasterNode" true
  "podSecurityContext" "deckhouse"
  "additionalControllerEnvs" (list
    (dict "name" "OSD_STORAGE_CLASS_NAME" "value" .Values.sdsElastic.osdStorageClassName)
  )
}}
{{ include "helm_lib_module_controller_manifests" (list . $config) }}
