{{- /* RBAC for the sds-elastic-controller */ -}}
{{- $rbacConfig := dict
  "roleRules" (list
    (dict "apiGroups" (list "") "resources" (list "secrets" "configmaps") "verbs" (list "get" "list" "watch"))
    (dict "apiGroups" (list "") "resources" (list "events") "verbs" (list "create" "list" "patch"))
    (dict "apiGroups" (list "apps") "resources" (list "deployments") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "coordination.k8s.io") "resources" (list "leases") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
  )
  "clusterRoleRules" (list
    (dict "apiGroups" (list "storage.deckhouse.io") "resources" (list "sdselasticclusters" "sdselasticclusters/status" "sdselasticclusters/finalizers") "verbs" (list "get" "list" "watch" "update" "patch"))
    (dict "apiGroups" (list "storage.deckhouse.io") "resources" (list "lvmlogicalvolumes") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "storage.deckhouse.io") "resources" (list "cephclusterconnections" "cephclusterconnections/status" "cephstorageclasses" "cephstorageclasses/status") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "ceph.rook.io") "resources" (list "cephclusters" "cephblockpools" "cephfilesystems" "cephobjectstores") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "") "resources" (list "persistentvolumes") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "") "resources" (list "nodes") "verbs" (list "get" "list" "watch"))
  )
}}
{{ include "helm_lib_module_controller_rbac" (list . $rbacConfig) }}
