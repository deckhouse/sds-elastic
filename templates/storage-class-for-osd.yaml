{{- /*
  Manual StorageClass for OSD-backing local PVs.
  Rendered only when the cluster is provisioned with LVM-backed OSDs, where
  the controller creates LVMLogicalVolume + local PV per node. The same SC
  name is wired into the controller via env OSD_STORAGE_CLASS_NAME.
*/ -}}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.sdsElastic.osdStorageClassName }}
  {{- include "helm_lib_module_labels" (list . (dict "app" .Chart.Name)) | nindent 2 }}
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
