{{- /*
  Per-image build descriptors.

  Component versions are discovered from oss.yaml dynamically: for every entry
  that declares versions[].condition.ceph we build a {<ceph_version> -> <component_version>}
  map and expose it as $.cephVersions["<id>"]. Per-image werf.inc.yaml templates
  then iterate `range $.cephVersions $.ImageName` without any per-component
  registry in this file.

  Adding a new ceph variant (or any other component selected by a `ceph` condition)
  requires only:
    - a new images/<id>/ folder with werf.inc.yaml,
    - a matching entry in oss.yaml with versions[].condition.ceph.
*/ -}}
{{- $ossCtx := dict "Files" $.Files "OssYamlPath" $.OssYamlPath }}
{{- $raw := printf "data:\n%s" ($.Files.Get $.OssYamlPath) | fromYaml }}
{{- $cephVersions := dict }}
{{- range $raw.data }}
  {{- $hasCeph := false }}
  {{- if .versions }}
    {{- range .versions }}
      {{- if and .condition (index .condition "ceph") }}
        {{- $hasCeph = true }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if $hasCeph }}
    {{- $m := include "get_oss_version_map_by_id_and_condition_key" (list .id "ceph" $ossCtx) | fromYaml }}
    {{- $_ := set $cephVersions .id $m }}
  {{- end }}
{{- end }}
{{- $_ := set $ "cephVersions" $cephVersions }}

{{- $ImagesBuildFiles := .Files.Glob "images/*/{Dockerfile,werf.inc.yaml}" }}
{{- $Root := . }}

{{- range $path, $content := $ImagesBuildFiles  }}
  {{- $ctx := dict }}
  {{- $_ := set $ctx "ImageName" ($path | split "/")._1 }}
  {{- $_ := set $ctx "SOURCE_REPO" $Root.SOURCE_REPO }}
  {{- $_ := set $ctx "MODULE_EDITION" $.MODULE_EDITION }}
  {{- $_ := set $ctx "SVACE_ENABLED" (env "SVACE_ENABLED" "false") }}
  {{- $_ := set $ctx "SVACE_PROJECT_PREFIX" "sds-elastic" }}
  {{- if ne $ctx.SVACE_ENABLED "false" }}{{- $_ := set $ctx "SVACE_IMAGE_SUFFIX" "/svace" }}{{- end }}
  {{- $_ := set $ctx "SVACE_ANALYZE_HOST" (env "SVACE_ANALYZE_HOST" "example.host") }}
  {{- $_ := set $ctx "SVACE_ANALYZE_SSH_USER" (env "SVACE_ANALYZE_SSH_USER" "user") }}
  {{- $_ := set $ctx "Versions" $.VERSIONS }}
  {{- $_ := set $ctx "ImagePath" (printf "/images/%s" $ctx.ImageName) }}
  {{- $_ := set $ctx "ModuleNamePrefix" "" }}
  {{- $_ := set $ctx "ModuleDir" "/" }}
  {{- $_ := set $ctx "GOPROXY" $Root.GOPROXY }}
  {{- $_ := set $ctx "DistroPackagesProxy" $Root.DistroPackagesProxy }}
  {{- $_ := set $ctx "Commit" $Root.Commit }}
  {{- $_ := set $ctx "ProjectName" (printf "%s/%s" $ctx.SVACE_PROJECT_PREFIX $ctx.ImageName ) }}
  {{- $_ := set $ctx "Files" $.Files }}
  {{- $_ := set $ctx "OssYamlPath" $.OssYamlPath }}
  {{- $_ := set $ctx "cephVersions" $.cephVersions }}
---
  {{- /* For Dockerfile just render it from the folder. */ -}}
  {{- if not (regexMatch "/werf.inc.yaml$" $path) }}
image: images/{{ $ctx.ImageName }}
context: images/{{ $ctx.ImageName }}
dockerfile: Dockerfile

  {{- /* For werf.inc.yaml render content by providing the ImageName param. */ -}}
  {{- else }}
{{ tpl $content $ctx }}

  {{- end }}
{{- end }}
